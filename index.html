<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure Quest V3.1</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#74c0fc;
    margin:0;
    padding:20px;
    text-align:center;
}
.container{
    max-width:900px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
.hidden{
    display:none;
}
.stats{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    margin:15px 0;
}
.question{
    font-size:32px;
    margin:20px 0;
    font-weight:bold;
}
input, select, button{
    padding:10px;
    font-size:18px;
    margin:5px;
}
button{
    cursor:pointer;
}
#badge{
    color:green;
}
</style>
</head>
<body>
<div class="container">
<h1>🏆 Math Adventure Quest V3.1</h1>
<div id="startScreen">
    <input type="text" id="player" placeholder="Enter Player Name">
    <select id="difficulty">
        <option value="10">Easy</option>
        <option value="25">Medium</option>
        <option value="50">Hard</option>
    </select>
    <br><br>
    <button onclick="startGame()">Start Adventure</button>
</div>
<div id="gameScreen" class="hidden">
    <h2 id="welcome"></h2>
    <div class="stats">
        <div>⭐ Score: <span id="score">0</span></div>
        <div>❤️ Lives: <span id="lives">3</span></div>
        <div>📈 Level: <span id="level">1</span></div>
        <div>⏱️ Time: <span id="timer">90</span></div>
    </div>
    <div class="question" id="question"></div>
    <input type="number" id="answer">
    <button onclick="checkAnswer()">Submit</button>
    <h3 id="result"></h3>
    <h2 id="badge"></h2>
    <h3>🏅 Achievements</h3>
    <ul id="achievements"></ul>
</div>
</div>
<script>
let score = 0;
let lives = 3;
let level = 1;
let timeLeft = 90;
let correctAnswer = 0;
let timerInterval;
function startGame(){
    let playerName =
        document.getElementById("player").value;
    if(playerName.trim() === ""){
        playerName = "Player";
    }
    document.getElementById("welcome").innerHTML =
        "Welcome, " + playerName + "!";
    document.getElementById("startScreen")
        .classList.add("hidden");
    document.getElementById("gameScreen")
        .classList.remove("hidden");
    generateQuestion();
    timerInterval = setInterval(function(){
        timeLeft--;
        document.getElementById("timer")
            .textContent = timeLeft;
        if(timeLeft <= 0){
            endGame();
        }
    },1000);
}
function generateQuestion(){
    let max =
        parseInt(
            document.getElementById("difficulty").value
        );
    let a =
        Math.floor(Math.random()*max)+1;
    let b =
        Math.floor(Math.random()*max)+1;
    let operation =
        Math.floor(Math.random()*5);
    if(operation === 0){
        correctAnswer = a + b;

        document.getElementById("question")
            .innerHTML = a + " + " + b + " = ?";
    }
    else if(operation === 1){

        if(a < b){
            let temp = a;
            a = b;
            b = temp;
        }
        correctAnswer = a - b;
        document.getElementById("question")
            .innerHTML = a + " - " + b + " = ?";
    }
    else if(operation === 2){
        a = Math.floor(Math.random()*12)+1;
        b = Math.floor(Math.random()*12)+1;
        correctAnswer = a * b;
        document.getElementById("question")
            .innerHTML = a + " × " + b + " = ?";
    }
    else if(operation === 3){
        a = Math.floor(Math.random()*12)+1;
        b = Math.floor(Math.random()*12)+1;
        let product = a * b;
        correctAnswer = a;
        document.getElementById("question")
            .innerHTML =
            product + " ÷ " + b + " = ?";
    }
    else{
        correctAnswer = a + b;
        document.getElementById("question")
            .innerHTML =
            "A class has " +
            a +
            " boys and " +
            b +
            " girls. Total students = ?";
    }
}
function updateAchievements(){
    let list = [];
    if(score >= 50){
        list.push("🥉 Bronze Explorer");
    }
    if(score >= 150){
        list.push("🥈 Silver Explorer");
    }
    if(score >= 300){
        list.push("🥇 Gold Explorer");
    }
    document.getElementById("achievements")
        .innerHTML =
        list.map(function(item){
            return "<li>" + item + "</li>";
        }).join("");
}
function checkAnswer(){
    let userAnswer =
        parseInt(
            document.getElementById("answer").value
        );
    if(userAnswer === correctAnswer){
        score += 10;
        document.getElementById("result")
            .innerHTML =
            "✅ Correct!";
        if(score % 100 === 0){
            level++;
        }
    }else{
        lives--;
        document.getElementById("result")
            .innerHTML =
            "❌ Wrong! Correct answer was "
            + correctAnswer;
    }
    document.getElementById("score")
        .textContent = score;
    document.getElementById("lives")
        .textContent = lives;
    document.getElementById("level")
        .textContent = level;
    if(score >= 300){
        document.getElementById("badge")
            .innerHTML =
            "👑 Math Champion";
    }
    else if(score >= 150){
        document.getElementById("badge")
            .innerHTML =
            "🥇 Gold Badge";
    }
    else if(score >= 50){
        document.getElementById("badge")
            .innerHTML =
            "🥉 Bronze Badge";
    }
    updateAchievements();
    document.getElementById("answer").value = "";
    if(lives <= 0){
        endGame();
        return;
    }
    generateQuestion();
}
function endGame(){
    clearInterval(timerInterval);
    alert(
        "Game Over!\n\nScore: "
        + score +
        "\nLevel: "
        + level
    );
    location.reload();
}
</script>

</body>
    </html>

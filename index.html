<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure Quest V2</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#87CEEB;
    text-align:center;
    margin:0;
    padding:20px;
}
.container{
    max-width:700px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
}
h1{
    color:#003366;
}
.stats{
    display:flex;
    justify-content:space-around;
    flex-wrap:wrap;
    margin:15px 0;
}
.question{
    font-size:32px;
    margin:20px;
    font-weight:bold;
}
input{
    padding:10px;
    font-size:18px;
}
button{
    padding:10px 20px;
    font-size:18px;
    cursor:pointer;
    margin:5px;
}
#result{
    font-size:20px;
    font-weight:bold;
}
</style>
</head>
<body>
<div class="container">
<h1>🏆 Math Adventure Quest V2</h1>
<div id="startScreen">
<p>Enter Your Name</p>
<input type="text" id="playerName">
<br><br>
<button onclick="startGame()">Start Adventure</button>
</div>
<div id="gameArea" style="display:none;">
<h2 id="welcome"></h2>
<div class="stats">
<div>⭐ Score: <span id="score">0</span></div>
<div>📈 Level: <span id="level">1</span></div>
</div>
<div class="question" id="question"></div>
<input type="number" id="answer">
<button onclick="checkAnswer()">Submit</button>
<p id="result"></p>
</div>
</div>
<script>
let score = 0;
let level = 1;
let correctAnswer = 0;
function startGame(){
    let player =
    document.getElementById("playerName").value;
    if(player.trim() === ""){
        player = "Player";
    }
    document.getElementById("welcome").innerHTML =
    "Welcome " + player + "!";
    document.getElementById("startScreen").style.display =
    "none";
    document.getElementById("gameArea").style.display =
    "block";
    generateQuestion();
}
function generateQuestion(){
    let operation =
    Math.floor(Math.random() * 4);
    let a;
    let b;
    if(operation === 0){
        a = Math.floor(Math.random()*20)+1;
        b = Math.floor(Math.random()*20)+1;
        correctAnswer = a + b;
        document.getElementById("question").innerHTML =
        a + " + " + b + " = ?";
    }
    else if(operation === 1){
        a = Math.floor(Math.random()*20)+1;
        b = Math.floor(Math.random()*20)+1;
        if(a < b){
            let temp = a;
            a = b;
            b = temp;
        }
        correctAnswer = a - b;
        document.getElementById("question").innerHTML =
        a + " - " + b + " = ?";
    }
    else if(operation === 2){
        a = Math.floor(Math.random()*12)+1;
        b = Math.floor(Math.random()*12)+1;
        correctAnswer = a * b;
        document.getElementById("question").innerHTML =
        a + " × " + b + " = ?";
    }
    else{
        a = Math.floor(Math.random()*12)+1;
        b = Math.floor(Math.random()*12)+1;
        let product = a * b;
        correctAnswer = a;
        document.getElementById("question").innerHTML =
        product + " ÷ " + b + " = ?";
    }
}
function checkAnswer(){
    let userAnswer =
    parseInt(document.getElementById("answer").value);
    if(userAnswer === correctAnswer){
        score += 10;
        document.getElementById("result").innerHTML =
        "✅ Correct!";
        if(score % 100 === 0){
            level++;
        }
    }else{
        document.getElementById("result").innerHTML =
        "❌ Wrong! Correct Answer = " +
        correctAnswer;
    }
    document.getElementById("score").innerHTML =
    score;
    document.getElementById("level").innerHTML =
    level;
    document.getElementById("answer").value = "";
    generateQuestion();
}
</script>
</body>
</html>

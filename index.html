<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Adventure Quest V3</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    margin:0;
    padding:0;
    text-align:center;
}
.container{
    max-width:500px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}
h1{
    color:#333;
}
input{
    width:80%;
    padding:10px;
    margin:10px;
    font-size:18px;
}
button{
    padding:12px 20px;
    border:none;
    border-radius:10px;
    background:#28a745;
    color:white;
    font-size:18px;
    cursor:pointer;
}
button:hover{
    background:#218838;
}
.stats{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    margin:15px 0;
    font-weight:bold;
}
.question{
    font-size:32px;
    margin:20px 0;
    color:#333;
}
#answer{
    width:120px;
    text-align:center;
}
.badge{
    font-size:22px;
    margin-top:10px;
}
.hidden{
    display:none;
}
#gameOver{
    padding:20px;
}
@media(max-width:600px){
    .question{
        font-size:26px;
    }
    button{
        width:100%;
        margin-top:10px;
    }
}
</style>
</head>
<body>
<div class="container">
<h1>🎮 Math Adventure Quest V3</h1>
<div id="startScreen">
    <p>Enter Your Name</p>
    <input type="text" id="playerName" placeholder="Your Name">
    <br>
    <button onclick="startGame()">Start Adventure</button>
</div>
<div id="gameScreen" class="hidden">
    <h2 id="welcome"></h2>
    <div class="stats">
        <span>🏆 Score: <span id="score">0</span></span>
        <span>⭐ Level: <span id="level">1</span></span>
    </div>
    <div class="stats">
        <span>❤️ Lives: <span id="lives">3</span></span>
        <span>⏱️ Time: <span id="timer">120</span>s</span>
    </div>
    <div class="question" id="question"></div>
    <input type="number" id="answer">
    <br><br>
    <button onclick="checkAnswer()">Submit Answer</button>
    <div class="badge" id="badge">
        🏅 No Badge Yet
    </div>
    <p id="message"></p>
</div>
<div id="gameOver" class="hidden">
    <h2>🎮 Game Over</h2>
    <p id="finalPlayer"></p>
    <p>Final Score: <strong id="finalScore"></strong></p>
    <p>Level Reached: <strong id="finalLevel"></strong></p>
    <p id="finalBadge"></p>
    <button onclick="restartGame()">Play Again</button>
</div>
</div>
<script>
let score = 0;
let level = 1;
let lives = 3;
let timeLeft = 120;
let num1;
let num2;
let correctAnswer;
let timerInterval;
function startGame(){
    let player = document.getElementById("playerName").value.trim();
    if(player === ""){
        alert("Please enter your name.");
        return;
    }
    document.getElementById("welcome").innerHTML =
        "Welcome, " + player + "!";
    document.getElementById("startScreen").classList.add("hidden");
    document.getElementById("gameScreen").classList.remove("hidden");
    generateQuestion();
    timerInterval = setInterval(updateTimer,1000);
}
function updateTimer(){
    timeLeft--;
    document.getElementById("timer").textContent = timeLeft;
    if(timeLeft <= 0){
        endGame();
    }
}
function generateQuestion(){
    const operations = ["+","-","×","÷"];
    let operation =
        operations[Math.floor(Math.random()*operations.length)];
    let maxNumber = level * 10;
    if(maxNumber < 10){
        maxNumber = 10;
    }
    num1 = Math.floor(Math.random()*maxNumber)+1;
    num2 = Math.floor(Math.random()*maxNumber)+1;
    if(operation === "+"){
        correctAnswer = num1 + num2;
    }
    else if(operation === "-"){
        if(num2 > num1){
            let temp = num1;
            num1 = num2;
            num2 = temp;
        }
        correctAnswer = num1 - num2;
    }
    else if(operation === "×"){
        correctAnswer = num1 * num2;
    }
    else{
        correctAnswer = num1;
        num2 = Math.floor(Math.random()*10)+1;
        num1 = correctAnswer * num2;
        correctAnswer = num1 / num2;
    }
    document.getElementById("question").innerHTML =
        num1 + " " + operation + " " + num2 + " = ?";
    document.getElementById("answer").value = "";
    document.getElementById("answer").focus();
}
function checkAnswer(){
    let userAnswer =
        parseInt(document.getElementById("answer").value);
    if(isNaN(userAnswer)){
        return;
    }
    if(userAnswer === correctAnswer){
        score += 10;
        document.getElementById("message").innerHTML =
            "✅ Correct!";
        if(score % 50 === 0){
            level++;
        }
    }else{
        lives--;
        document.getElementById("message").innerHTML =
            "❌ Wrong! Correct answer was " + correctAnswer;
        document.getElementById("lives").textContent = lives;
        if(lives <= 0){
            endGame();
            return;
        }
    }
    document.getElementById("score").textContent = score;
    document.getElementById("level").textContent = level;
    updateBadge();
    generateQuestion();
}
function updateBadge(){
    let badgeText = "🏅 No Badge Yet";
    if(score >= 50 && score < 100){
        badgeText = "🥉 Bronze Badge";
    }
    else if(score >= 100 && score < 200){
        badgeText = "🥈 Silver Badge";
    }
    else if(score >= 200){
        badgeText = "🥇 Gold Badge";
    }
    document.getElementById("badge").innerHTML = badgeText;
}
function getBadge(){
    if(score >= 200){
        return "🥇 Gold Badge";
    }
    if(score >= 100){
        return "🥈 Silver Badge";
    }
    if(score >= 50){
        return "🥉 Bronze Badge";
    }
    return "🏅 No Badge";
}
function endGame(){
    clearInterval(timerInterval);
    document.getElementById("gameScreen")
        .classList.add("hidden");
    document.getElementById("gameOver")
        .classList.remove("hidden");
    document.getElementById("finalPlayer").innerHTML =
        "Player: " +
        document.getElementById("playerName").value;
    document.getElementById("finalScore").innerHTML = score;
    document.getElementById("finalLevel").innerHTML = level;
    document.getElementById("finalBadge").innerHTML =
        "Award Earned: " + getBadge();
}
function restartGame(){
    score = 0;
    level = 1;
    lives = 3;
    timeLeft = 120;
    document.getElementById("score").textContent = score;
    document.getElementById("level").textContent = level;
    document.getElementById("lives").textContent = lives;
    document.getElementById("timer").textContent = timeLeft;
    document.getElementById("badge").innerHTML =
        "🏅 No Badge Yet";
    document.getElementById("message").innerHTML = "";
    document.getElementById("gameOver")
        .classList.add("hidden");
    document.getElementById("gameScreen")
        .classList.remove("hidden");
    generateQuestion();
    timerInterval = setInterval(updateTimer,1000);
}
</script>
</body>
    </html>
